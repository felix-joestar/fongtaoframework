spring:
  application:
    name: fongtao-admin-website
  datasource:
    url: jdbc:p6spy:mysql://127.0.0.1:3306/fongtao_admin?characterEncoding=utf8&connectTimeout=5000&socketTimeout=30000&useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password: gwcloud@123
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 5000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      max-evictable-idle-time-millis: 600000
      validation-query: select 1
      validation-query-timeout: 3
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      keep-alive: true
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password: gwcloud@123
      timeout: 30s
      connect-timeout: 30s
      lettuce:
        pool:
          min-idle: 10
          max-idle: 50
          max-active: 500
          max-wait: 60000
        shutdown-timeout: 30s
  cache:
    type: redis
    redis:
      cache-null-values: false
      time-to-live: 1h
      key-prefix: "fongtao:"
  sql:
    init:
      # 启动前手工执行 fongtao-admin-parent/_database_schema/admin-mysql-schema.sql。
      mode: never

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: ../logs
  level:
    root: INFO
    com.fongtaoframework: DEBUG
    p6spy: INFO

fongtao:
  logging:
    request:
      enabled: false
  security:
    jwt:
      secret: fongtao-admin-local-jwt-secret-2026-07-21
